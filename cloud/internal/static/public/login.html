<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TmdX — Sign In</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="stylesheet" href="fonts.css">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #050d18;
      color: #c0c8d8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(218, 119, 86, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(218, 119, 86, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(218, 119, 86, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 48px 40px;
      background: rgba(10, 18, 30, 0.85);
      border: 1px solid rgba(218, 119, 86, 0.15);
      border-radius: 16px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 24px 64px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(218, 119, 86, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      text-align: center;
    }

    .logo {
      margin-bottom: 8px;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: #000;
      border: 1px solid rgba(218, 119, 86, 0.25);
      margin-bottom: 16px;
      box-shadow: 0 0 20px rgba(218, 119, 86, 0.08);
      overflow: hidden;
    }

    .logo-icon img {
      width: 120%;
      height: 120%;
    }

    .app-name {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: 28px;
      letter-spacing: 0.5px;
      color: #e8ecf4;
      margin-bottom: 8px;
    }

    .app-name span {
      font-weight: 400;
      color: #da7756;
    }

    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 300;
      font-size: 13px;
      color: #5a6578;
      letter-spacing: 0.3px;
      margin-bottom: 40px;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      color: #5a6578;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #e8ecf4;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      border-color: rgba(218, 119, 86, 0.5);
      box-shadow: 0 0 0 3px rgba(218, 119, 86, 0.1);
    }

    .form-group input::placeholder {
      color: #3a4455;
    }

    .submit-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px 24px;
      margin-top: 8px;
      background: rgba(218, 119, 86, 0.15);
      border: 1px solid rgba(218, 119, 86, 0.3);
      border-radius: 10px;
      color: #da7756;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .submit-btn:hover {
      background: rgba(218, 119, 86, 0.25);
      border-color: rgba(218, 119, 86, 0.5);
      box-shadow: 0 4px 20px rgba(218, 119, 86, 0.15);
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(255, 60, 60, 0.08);
      border: 1px solid rgba(255, 60, 60, 0.2);
      border-radius: 8px;
      color: #ff6b6b;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      text-align: left;
    }

    .toggle-mode {
      margin-top: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #5a6578;
    }

    .toggle-mode a {
      color: #da7756;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }

    .toggle-mode a:hover {
      color: #e8a07a;
    }

    .footer-text {
      margin-top: 32px;
      font-size: 11px;
      color: #3a4455;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 300;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: #da7756;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @media (max-width: 480px) {
      .login-card {
        margin: 16px;
        padding: 36px 28px;
      }

      .app-name {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">
        <img src="/favicon.svg" alt="TmdX" width="36" height="36">
      </div>
      <h1 class="app-name">Tmd<span>X</span></h1>
      <p class="tagline">Remote terminals, file editor &amp; git graph — one canvas for all your machines.<span class="cursor"></span></p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="your username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="your password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="submit-btn" id="submit-btn">Sign In</button>
      <div class="error-msg" id="error-msg"></div>
    </form>

    <div class="toggle-mode">
      <span id="toggle-text">Don't have an account?</span>
      <a id="toggle-link" onclick="toggleMode()">Register</a>
    </div>

    <p class="footer-text">Local authentication — no third-party login</p>
  </div>

  <a href="/tutorial" class="tutorial-link">Take the Interactive Tour</a>

  <style>
    .tutorial-link {
      position: relative;
      z-index: 1;
      display: inline-block;
      margin-top: 20px;
      padding: 8px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      transition: all 0.2s ease;
    }
    .tutorial-link:hover {
      color: rgba(255, 255, 255, 0.6);
      border-color: rgba(218, 119, 86, 0.3);
      background: rgba(218, 119, 86, 0.05);
    }
  </style>
  <script>
    let isRegisterMode = false;

    function toggleMode() {
      isRegisterMode = !isRegisterMode;
      const btn = document.getElementById('submit-btn');
      const text = document.getElementById('toggle-text');
      const link = document.getElementById('toggle-link');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      if (isRegisterMode) {
        btn.textContent = 'Create Account';
        text.textContent = 'Already have an account?';
        link.textContent = 'Sign In';
      } else {
        btn.textContent = 'Sign In';
        text.textContent = "Don't have an account?";
        link.textContent = 'Register';
      }
    }

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = isRegisterMode ? 'Creating...' : 'Signing in...';

      const endpoint = isRegisterMode ? '/auth/register' : '/auth/login';

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password }),
        });

        if (res.ok) {
          window.location.href = '/';
          return;
        }

        const data = await res.json().catch(() => ({}));
        errEl.textContent = data.error || 'Something went wrong';
        errEl.style.display = 'block';
      } catch (err) {
        errEl.textContent = 'Network error — please try again';
        errEl.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = isRegisterMode ? 'Create Account' : 'Sign In';
    });
  </script>
</body>
</html>
